name: smart_parking
description: "Smart Parking - Ứng dụng tìm bãi đỗ xe thông minh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.2


  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # UI
  fl_chart: ^0.70.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Internationalization
  intl: ^0.20.2

  # Utils
  equatable: ^2.0.7
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  http: ^1.2.2
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  flutter_local_notifications: ^20.1.0
  signalr_netcore: ^1.4.4
  timezone: ^0.10.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  mobile_scanner: ^7.2.0
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lang/
